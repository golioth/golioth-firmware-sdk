name: "Doc: Doxygen to Firebase (PR)"
on: pull_request
jobs:
  deploy_doxygen_dev:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install Doxygen
        run: |
          sudo apt install wget graphviz
          wget \
            https://github.com/doxygen/doxygen/releases/download/Release_1_10_0/doxygen-1.10.0.linux.bin.tar.gz
          tar -xvf doxygen-1.10.0.linux.bin.tar.gz
          cd doxygen-1.10.0
          sudo make install
      - name: Update submodule
        run: git submodule update --init --recursive docs/doxygen/doxygen-awesome-css
      - name: Generate Doxygen
        run: |
          cd docs/doxygen
          doxygen
      # Pin the node24 version to workaround regression in firebase-tools:
      # https://github.com/firebase/firebase-tools/issues/10716#issuecomment-4800040219
      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24.18.0'
      - name: Deploy docs to dev
        # yamllint disable-line rule:line-length
        uses: FirebaseExtended/action-hosting-deploy@500ac625ca2dd40cbd15f7659af953801858032a # v0.11.0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_GOLIOTH }}'
          projectId: golioth
          target: docs-dev
          entryPoint: docs
        env:
          FIREBASE_CLI_PREVIEWS: hostingchannels
